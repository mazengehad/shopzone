<nav class="shop-navbar">
  <div class="shop-navbar__inner">
    <a class="shop-navbar__brand" routerLink="/products">
      <span class="shop-navbar__brand-mark">SZ</span>
      <span>
        <strong>ShopZone</strong>
      </span>
    </a>

    <div class="shop-navbar__links" *ngIf="currentUser() as currentUser; else guestLinks">
      <a
        class="nav-link"
        routerLink="/products"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        Products
      </a>

      <a class="nav-link" *ngIf="isAdmin()" routerLink="/admin" routerLinkActive="is-active">
        Admin
      </a>

      <a class="nav-link" routerLink="/wishlist" routerLinkActive="is-active"> Wishlist </a>

      <a
        class="nav-link"
        routerLink="/cart"
        routerLinkActive="is-active"
        [class.is-celebrating]="badgePulse()"
      >
        <svg viewBox="0 0 24 24">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg>
        Cart
        <span class="shop-navbar__badge" *ngIf="cartCount$ | async as count">{{ count }}</span>
      </a>

      <a class="nav-link" routerLink="/orders" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Orders
      </a>

      <a class="nav-link" routerLink="/profile" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        Profile
      </a>

      <div class="shop-navbar__user">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
        <span>{{ currentUser.name }}</span>
      </div>

      <button class="shop-navbar__theme-toggle" type="button" (click)="themeService.toggleTheme()">
        <!-- Sun icon for dark mode (click to switch to light) -->
        <svg *ngIf="themeService.theme() === 'dark'" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon for light mode (click to switch to dark) -->
        <svg *ngIf="themeService.theme() === 'light'" viewBox="0 0 24 24">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <button class="shop-navbar__logout" type="button" (click)="logout()">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>

    <ng-template #guestLinks>
      <div class="shop-navbar__links">
        <a
          class="nav-link"
          routerLink="/products"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          >Products</a
        >
        <a class="nav-link" routerLink="/login" routerLinkActive="is-active">Login</a>
        
        <button class="shop-navbar__theme-toggle" type="button" (click)="themeService.toggleTheme()">
          <svg *ngIf="themeService.theme() === 'dark'" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg *ngIf="themeService.theme() === 'light'" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <a
          class="primary-button"
          style="width: auto; min-height: 2.2rem; padding: 0 1rem"
          routerLink="/register"
          routerLinkActive="is-active"
          >Register</a
        >
      </div>
    </ng-template>
  </div>

  <div class="shop-mobile-nav" *ngIf="currentUser(); else guestMobileNav">
    <a
      class="shop-mobile-nav__item"
      routerLink="/products"
      routerLinkActive="is-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <svg viewBox="0 0 24 24">
        <path d="M3 11.5L12 4l9 7.5"></path>
        <path d="M5 10.5V20h14v-9.5"></path>
      </svg>
      <span>Home</span>
    </a>
    <a
      class="shop-mobile-nav__item"
      *ngIf="isAdmin()"
      routerLink="/admin"
      routerLinkActive="is-active"
    >
      <svg viewBox="0 0 24 24">
        <path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4z"></path>
        <path d="M9.5 12l1.5 1.5 3.5-3.5"></path>
      </svg>
      <span>Admin</span>
    </a>
    <a
      class="shop-mobile-nav__item"
      routerLink="/products"
      [queryParams]="{ focus: 'search' }"
      routerLinkActive="is-active"
    >
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
      </svg>
      <span>Search</span>
    </a>
    <a
      class="shop-mobile-nav__item"
      routerLink="/cart"
      routerLinkActive="is-active"
      [class.is-celebrating]="badgePulse()"
    >
      <svg viewBox="0 0 24 24">
        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      <span>Cart</span>
      <span class="shop-mobile-nav__badge" *ngIf="cartCount$ | async as mCount">{{ mCount }}</span>
    </a>
    <a class="shop-mobile-nav__item" routerLink="/profile" routerLinkActive="is-active">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      <span>Profile</span>
    </a>
  </div>

  <ng-template #guestMobileNav>
    <div class="shop-mobile-nav">
      <a class="shop-mobile-nav__item" routerLink="/products" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24">
          <path d="M3 11.5L12 4l9 7.5"></path>
          <path d="M5 10.5V20h14v-9.5"></path>
        </svg>
        <span>Home</span>
      </a>
      <a
        class="shop-mobile-nav__item"
        routerLink="/products"
        [queryParams]="{ focus: 'search' }"
        routerLinkActive="is-active"
      >
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="20" y1="20" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search</span>
      </a>
      <a class="shop-mobile-nav__item" routerLink="/login" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24">
          <path d="M10 17l5-5-5-5"></path>
          <path d="M15 12H3"></path>
          <path d="M21 21V3"></path>
        </svg>
        <span>Login</span>
      </a>
      <a class="shop-mobile-nav__item" routerLink="/register" routerLinkActive="is-active">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        <span>Register</span>
      </a>
    </div>
  </ng-template>
</nav>
